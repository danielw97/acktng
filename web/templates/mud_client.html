<div id='mud-client-container'>
<h1>ACKMUD Web Client</h1>
<p class='muted'>Select a world and press Connect.</p>
<div class='mud-controls'>
  <label for='world-select'>World</label>
  <select id='world-select'>__WORLD_OPTIONS__</select>
  <button id='connect-btn' type='button'>Connect</button>
  <button id='disconnect-btn' type='button'>Disconnect</button>
  <span style='margin-left:auto;display:flex;gap:.4rem;flex-wrap:wrap;'>
    <button id='terrain-toggle-btn' type='button' style='display:none'>&#x1F5FA; Terrain</button>
    <button id='look-toggle-btn' type='button' style='display:none'>&#x1F441; Look</button>
    <button id='fullscreen-btn' type='button'>&#x26F6; Fullscreen</button>
  </span>
</div>
<pre id='mud-output' class='mud-output'>Ready.</pre>
<div class='mud-controls'>
  <input id='mud-command' placeholder='Type a command and press Enter' style='flex:1;min-width:280px;'>
  <button id='send-btn' type='button'>Send</button>
</div>
<div id='music-controls' class='mud-controls' style='display:none;align-items:center;gap:8px;flex-wrap:wrap;'>
  <span style='opacity:0.7;font-size:0.85em;'>&#9835; Music:</span>
  <button id='music-play-btn' type='button'>&#9654; Play</button>
  <button id='music-stop-btn' type='button'>&#9646;&#9646; Stop</button>
  <label style='display:flex;align-items:center;gap:4px;font-size:0.85em;'>
    Vol
    <input id='music-volume' type='range' min='0' max='1' step='0.05' value='0.5' style='width:80px;'>
  </label>
  <label style='display:flex;align-items:center;gap:4px;font-size:0.85em;cursor:pointer;'>
    <input id='music-loop' type='checkbox' checked>
    Loop
  </label>
</div>
<audio id='mud-audio'></audio>
<audio id='mud-audio-next'></audio>
</div>

<!-- Floating windows — fixed to viewport, draggable by their title bar -->
<div class='float-window' id='terrain-window'>
  <div class='float-window-header'>
    <span class='float-window-title'>&#x1F5FA; Terrain</span>
    <button class='float-window-close' data-target='terrain-window' type='button'>&#x2715;</button>
  </div>
  <div class='float-window-body'>
    <pre id='terrain-output' class='float-window-pre'>No terrain data.</pre>
  </div>
</div>

<div class='float-window' id='look-window'>
  <div class='float-window-header'>
    <span class='float-window-title'>&#x1F441; Look</span>
    <button class='float-window-close' data-target='look-window' type='button'>&#x2715;</button>
  </div>
  <div class='float-window-body'>
    <pre id='look-output' class='float-window-pre'>No room data.</pre>
  </div>
</div>

<script>
(() => {
  const worldSelect = document.getElementById('world-select');
  const connectBtn = document.getElementById('connect-btn');
  const disconnectBtn = document.getElementById('disconnect-btn');
  const commandInput = document.getElementById('mud-command');
  const sendBtn = document.getElementById('send-btn');
  const output = document.getElementById('mud-output');
  const fullscreenBtn = document.getElementById('fullscreen-btn');
  const container = document.getElementById('mud-client-container');
  const musicControls = document.getElementById('music-controls');
  const musicPlayBtn = document.getElementById('music-play-btn');
  const musicStopBtn = document.getElementById('music-stop-btn');
  const musicVolume = document.getElementById('music-volume');
  const musicLoop = document.getElementById('music-loop');
  const audio = document.getElementById('mud-audio');
  const audioNext = document.getElementById('mud-audio-next');
  let socket = null;
  let fadeTimer = null;

  audio.volume = parseFloat(musicVolume.value);
  audio.loop = musicLoop.checked;

  musicPlayBtn.addEventListener('click', () => audio.play());
  musicStopBtn.addEventListener('click', () => {
    if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
    audio.pause(); audio.currentTime = 0;
    audioNext.pause(); audioNext.src = '';
  });
  musicVolume.addEventListener('input', () => { audio.volume = parseFloat(musicVolume.value); });
  musicLoop.addEventListener('change', () => { audio.loop = musicLoop.checked; audioNext.loop = musicLoop.checked; });

  fullscreenBtn.addEventListener('click', () => {
    const isFullscreen = container.classList.toggle('mud-fullscreen');
    document.body.classList.toggle('mud-fullscreen-active', isFullscreen);
    fullscreenBtn.textContent = isFullscreen ? '\u2715 Exit Fullscreen' : '\u26F6 Fullscreen';
    output.scrollTop = output.scrollHeight;
  });

  const ANSI_COLORS = {
    30: '#222222', 31: '#ff5f56', 32: '#27c93f', 33: '#ffbd2e',
    34: '#61afef', 35: '#c678dd', 36: '#56b6c2', 37: '#d7dae0',
    90: '#7f848e', 91: '#ff7b72', 92: '#3fb950', 93: '#e3b341',
    94: '#79c0ff', 95: '#d2a8ff', 96: '#a5f3fc', 97: '#f0f6fc'
  };

  const escapeHtml = (value) => value.replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
  const ansiToHtml = (text) => {
    const chunks = text.split(/(\x1b\[[0-9;]*m)/g);
    let styles = { fg: '', bg: '', bold: false, underline: false };
    let html = '';
    const styleText = () => {
      const entries = [];
      if (styles.fg) entries.push(`color:${styles.fg}`);
      if (styles.bg) entries.push(`background:${styles.bg}`);
      if (styles.bold) entries.push('font-weight:700');
      if (styles.underline) entries.push('text-decoration:underline');
      return entries.length ? ` style="${entries.join(';')}"` : '';
    };

    for (const chunk of chunks) {
      const match = chunk.match(/^\x1b\[([0-9;]*)m$/);
      if (!match) {
        if (chunk.length) html += `<span${styleText()}>${escapeHtml(chunk)}</span>`;
        continue;
      }
      const codes = match[1] ? match[1].split(';').map(Number) : [0];
      for (const code of codes) {
        if (code === 0) styles = { fg: '', bg: '', bold: false, underline: false };
        else if (code === 1) styles.bold = true;
        else if (code === 22) styles.bold = false;
        else if (code === 4) styles.underline = true;
        else if (code === 24) styles.underline = false;
        else if (code === 39) styles.fg = '';
        else if (code === 49) styles.bg = '';
        else if (ANSI_COLORS[code]) styles.fg = ANSI_COLORS[code];
        else if (ANSI_COLORS[code - 10]) styles.bg = ANSI_COLORS[code - 10];
      }
    }
    return html;
  };

  const appendOutput = (text) => {
    output.insertAdjacentHTML('beforeend', ansiToHtml(text));
    output.scrollTop = output.scrollHeight;
  };

  const selectedWorld = () => worldSelect.options[worldSelect.selectedIndex];
  const defaultWsUrlForWorld = () => {
    const world = selectedWorld();
    if (!world) return '';
    if (world.dataset.ws) return world.dataset.ws;
    const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
    return `${scheme}://${world.dataset.host}:${world.dataset.port}/`;
  };
  const closeSocket = () => {
    if (!socket) return;
    try { socket.close(); } catch (err) {}
  };

  const showWorld = () => appendOutput(`\n[World] ${selectedWorld().textContent}\n`);
  worldSelect.addEventListener('change', showWorld);
  showWorld();

  /* ── Floating window management ── */
  let topZ = 10000;

  const bringToFront = (win) => { win.style.zIndex = ++topZ; };

  const makeDraggable = (win) => {
    const header = win.querySelector('.float-window-header');
    let dragging = false, sx, sy, ox, oy;

    const startDrag = (cx, cy) => {
      dragging = true;
      sx = cx; sy = cy;
      ox = win.offsetLeft; oy = win.offsetTop;
      bringToFront(win);
    };
    const moveDrag = (cx, cy) => {
      if (!dragging) return;
      win.style.left = Math.max(0, ox + cx - sx) + 'px';
      win.style.top  = Math.max(0, oy + cy - sy) + 'px';
    };
    const endDrag = () => { dragging = false; };

    header.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('float-window-close')) return;
      startDrag(e.clientX, e.clientY);
      e.preventDefault();
    });
    header.addEventListener('touchstart', (e) => {
      if (e.target.classList.contains('float-window-close')) return;
      const t = e.touches[0];
      startDrag(t.clientX, t.clientY);
    }, { passive: true });

    document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
    document.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      moveDrag(t.clientX, t.clientY);
    }, { passive: true });
    document.addEventListener('mouseup', endDrag);
    document.addEventListener('touchend', endDrag);

    win.addEventListener('mousedown', () => bringToFront(win));
  };

  const positionAndShow = (win, defaultLeft, defaultTop) => {
    if (!win.dataset.positioned) {
      win.style.left = Math.max(0, Math.min(defaultLeft, window.innerWidth - 300)) + 'px';
      win.style.top  = Math.max(0, defaultTop) + 'px';
      win.dataset.positioned = '1';
    }
    win.classList.add('visible');
    bringToFront(win);
  };

  const toggleWindow = (id, defaultLeft, defaultTop) => {
    const win = document.getElementById(id);
    if (win.classList.contains('visible')) {
      win.classList.remove('visible');
    } else {
      positionAndShow(win, defaultLeft, defaultTop);
    }
  };

  document.querySelectorAll('.float-window').forEach(makeDraggable);

  document.querySelectorAll('.float-window-close').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.getElementById(btn.dataset.target).classList.remove('visible');
    });
  });

  document.getElementById('terrain-toggle-btn').addEventListener('click', () => {
    toggleWindow('terrain-window', window.innerWidth - 340, 80);
  });
  document.getElementById('look-toggle-btn').addEventListener('click', () => {
    toggleWindow('look-window', window.innerWidth - 340, 340);
  });

  const terrainToggleBtn = document.getElementById('terrain-toggle-btn');
  const lookToggleBtn = document.getElementById('look-toggle-btn');

  const handleFloatCommand = (cmd) => {
    if (cmd.type === 'terrain' && cmd.data !== undefined) {
      document.getElementById('terrain-output').innerHTML = ansiToHtml(cmd.data);
      terrainToggleBtn.style.display = '';
      const win = document.getElementById('terrain-window');
      if (!win.classList.contains('visible')) positionAndShow(win, window.innerWidth - 340, 80);
      else bringToFront(win);
      return true;
    }
    if (cmd.type === 'look' && cmd.data !== undefined) {
      document.getElementById('look-output').innerHTML = ansiToHtml(cmd.data);
      lookToggleBtn.style.display = '';
      const win = document.getElementById('look-window');
      if (!win.classList.contains('visible')) positionAndShow(win, window.innerWidth - 340, 340);
      else bringToFront(win);
      return true;
    }
    return false;
  };

  /* Hide float windows and their toggle buttons when disconnected */
  const hideFloatWindows = () => {
    terrainToggleBtn.style.display = 'none';
    lookToggleBtn.style.display = 'none';
    document.getElementById('terrain-window').classList.remove('visible');
    document.getElementById('look-window').classList.remove('visible');
  };

  /* ── Music ── */
  const FADE_DURATION = 2000;
  const FADE_INTERVAL = 50;

  const handleMusicCommand = (cmd) => {
    if (cmd.action === 'play' && cmd.url) {
      musicControls.style.display = 'flex';
      const targetVol = parseFloat(musicVolume.value);

      /* If nothing is playing yet, start immediately with no fade */
      if (audio.paused || !audio.src) {
        audio.src = cmd.url;
        audio.loop = musicLoop.checked;
        audio.volume = targetVol;
        audio.play().catch(() => {});
        return;
      }

      /* Already playing the same track — do nothing */
      if (audio.src === cmd.url) return;

      /* Crossfade: load next track into audioNext, fade out audio, fade in audioNext */
      if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }

      const outgoing = audio;
      const incoming = audioNext;
      incoming.src = cmd.url;
      incoming.loop = musicLoop.checked;
      incoming.volume = 0;
      incoming.play().catch(() => {});

      const steps = FADE_DURATION / FADE_INTERVAL;
      let step = 0;
      fadeTimer = setInterval(() => {
        step++;
        const t = Math.min(step / steps, 1);
        outgoing.volume = targetVol * (1 - t);
        incoming.volume = targetVol * t;
        if (t >= 1) {
          clearInterval(fadeTimer);
          fadeTimer = null;
          outgoing.pause();
          outgoing.src = incoming.src;
          outgoing.loop = incoming.loop;
          outgoing.volume = targetVol;
          /* Swap: carry current position of incoming into the main element */
          outgoing.currentTime = incoming.currentTime;
          outgoing.play().catch(() => {});
          incoming.pause();
          incoming.src = '';
        }
      }, FADE_INTERVAL);
    } else if (cmd.action === 'stop') {
      /* Fade out current track and stop */
      if (audio.paused || !audio.src) return;
      if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
      const targetVol = parseFloat(musicVolume.value);
      const startVol = audio.volume;
      const steps = FADE_DURATION / FADE_INTERVAL;
      let step = 0;
      fadeTimer = setInterval(() => {
        step++;
        const t = Math.min(step / steps, 1);
        audio.volume = startVol * (1 - t);
        if (t >= 1) {
          clearInterval(fadeTimer);
          fadeTimer = null;
          audio.pause();
          audio.src = '';
          audio.volume = targetVol;
        }
      }, FADE_INTERVAL);
    }
  };

  /* ── Connection ── */
  connectBtn.addEventListener('click', () => {
    if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
      appendOutput('\n[Info] Already connected.\n');
      return;
    }

    const wsUrl = defaultWsUrlForWorld();
    if (!wsUrl) {
      appendOutput('[Error] Selected world has no WebSocket endpoint.\n');
      return;
    }

    output.textContent = '';
    /* Reset float windows for fresh connection */
    document.querySelectorAll('.float-window').forEach((w) => { delete w.dataset.positioned; });
    appendOutput(`[Connecting] ${wsUrl}\n`);
    try {
      socket = new WebSocket(wsUrl);
    } catch (err) {
      appendOutput(`[Error] Could not create WebSocket: ${err.message}\n`);
      socket = null;
      return;
    }

    socket.addEventListener('open', () => {
      appendOutput(`[Connected] ${selectedWorld().textContent}\n`);
      commandInput.focus();
    });
    socket.addEventListener('message', (event) => {
      if (typeof event.data === 'string' && event.data.startsWith('{')) {
        try {
          const cmd = JSON.parse(event.data);
          if (handleFloatCommand(cmd)) return;
          if (cmd.type === 'music') { handleMusicCommand(cmd); return; }
        } catch (_) {}
      }
      appendOutput(typeof event.data === 'string' ? event.data : '[Binary message received]\n');
    });
    socket.addEventListener('close', (event) => {
      appendOutput(`\n[Disconnected] code=${event.code} reason=${event.reason || 'none'}\n`);
      socket = null;
      hideFloatWindows();
    });
    socket.addEventListener('error', () => {
      appendOutput('\n[Error] WebSocket handshake failed for this endpoint.\n');
    });
  });

  disconnectBtn.addEventListener('click', () => {
    if (!socket || (socket.readyState !== WebSocket.OPEN && socket.readyState !== WebSocket.CONNECTING)) {
      appendOutput('\n[Info] No active connection.\n');
      socket = null;
      return;
    }
    closeSocket();
    appendOutput('\n[Disconnected by user]\n');
    hideFloatWindows();
  });

  const sendCommand = () => {
    const command = commandInput.value;
    if (!socket || socket.readyState !== WebSocket.OPEN) return;
    socket.send(`${command}\n`);
    appendOutput(`\n> ${command}\n`);
    commandInput.value = '';
  };

  sendBtn.addEventListener('click', sendCommand);
  commandInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') sendCommand();
  });
})();
</script>
