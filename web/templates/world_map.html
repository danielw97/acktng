<h1>World Map</h1>
<p class='muted'>A stylized rendering of the known world.</p>

<div style='margin:1.25rem 0;text-align:center;'>
  <a href='/img/acktng.png' target='_blank' title='Open full-size map'>
    <img
      src='/img/acktng.png'
      alt='Stylized World Map'
      style='max-width:100%;height:auto;border-radius:var(--radius);border:1px solid var(--line);box-shadow:0 8px 40px rgba(0,0,0,.6);cursor:zoom-in;transition:box-shadow .2s;'
      onmouseover="this.style.boxShadow='0 8px 48px rgba(91,156,246,.25)'"
      onmouseout="this.style.boxShadow='0 8px 40px rgba(0,0,0,.6)'"
    >
  </a>
</div>
<p class='muted' style='font-size:.85rem;text-align:center;'>Click the map to open the full-resolution image.</p>
