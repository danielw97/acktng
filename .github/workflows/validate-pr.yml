name: Validate PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            gcc \
            make \
            pkg-config \
            zlib1g-dev \
            libssl-dev \
            clang-format

      - name: Check formatting (make lint)
        working-directory: src
        run: |
          make lint

      - name: Build server (make ack)
        working-directory: src
        run: |
          make ack

      - name: Run unit tests and integration tests (make unit-tests)
        working-directory: src
        run: |
          make unit-tests

      - name: Comment on PR if checks pass
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build, format, and all tests passed.'
            });

      - name: Comment on PR if checks fail
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ PR validation failed. Check the Actions log for details (build errors, formatting issues, or failing tests).'
            });
