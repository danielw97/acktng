name: Deploy on Merge to Main

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Get merged PR title
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const merged = commits.data.find(pr => pr.merged_at !== null);
            const title = merged ? merged.title : `Direct push: ${context.sha.substring(0, 7)}`;
            const url = merged ? merged.html_url : `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            core.setOutput('title', title);
            core.setOutput('url', url);

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Merged to main\",\"description\":\"${{ steps.pr.outputs.title }}\",\"url\":\"${{ steps.pr.outputs.url }}\",\"color\":5763719}]}"

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code and rebuild on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git stash
            git pull origin main
            cd src
            make ack
            echo "Build complete."
            touch ../data/hotreboot.trigger
            echo "Hotreboot trigger set. MUD will warn players and hotreboot in 60 seconds."
