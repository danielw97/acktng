name: Validate Open PRs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read
  pull-requests: write

jobs:
  discover-open-prs:
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.collect.outputs.prs }}
      count: ${{ steps.collect.outputs.count }}
    steps:
      - name: Collect open pull requests
        id: collect
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const numbers = pulls.map((pull) => pull.number);
            core.info(`Found ${numbers.length} open PR(s): ${numbers.join(', ') || 'none'}`);
            core.setOutput('prs', JSON.stringify(numbers));
            core.setOutput('count', String(numbers.length));

  validate-open-prs:
    needs: discover-open-prs
    if: needs.discover-open-prs.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.discover-open-prs.outputs.prs) }}
    steps:
      - name: Checkout PR #${{ matrix.pr }}
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ matrix.pr }}/head

      - name: Install clang-format for PR #${{ matrix.pr }}
        run: sudo apt-get install -y clang-format

      - name: Lint source style for PR #${{ matrix.pr }}
        id: lint
        continue-on-error: true
        run: make lint
        working-directory: src

      - name: Build unit tests for PR #${{ matrix.pr }}
        id: tests
        continue-on-error: true
        run: make unit-tests
        working-directory: src

      - name: Approve PR #${{ matrix.pr }} if lint and tests pass
        if: steps.lint.outcome == 'success' && steps.tests.outcome == 'success'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ matrix.pr }}
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PR_NUMBER),
              event: 'APPROVE',
              body: 'Automated approval: `make lint` and `make unit-tests` passed for this pull request.',
            });

      - name: Reject PR #${{ matrix.pr }} if lint or tests fail
        if: steps.lint.outcome == 'failure' || steps.tests.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ matrix.pr }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
        with:
          script: |
            const lintFailed = process.env.LINT_OUTCOME === 'failure';
            const testsFailed = process.env.TESTS_OUTCOME === 'failure';
            const reasons = [];
            if (lintFailed) reasons.push('`make lint` failed (run `make format` to auto-fix style)');
            if (testsFailed) reasons.push('`make unit-tests` failed');
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PR_NUMBER),
              event: 'REQUEST_CHANGES',
              body: `Automated rejection: ${reasons.join(' and ')} for this pull request.`,
            });

      - name: Fail workflow when lint or tests fail
        if: steps.lint.outcome == 'failure' || steps.tests.outcome == 'failure'
        run: |
          echo "Lint or unit tests failed for PR #${{ matrix.pr }}."
          exit 1

  no-open-prs:
    needs: discover-open-prs
    if: needs.discover-open-prs.outputs.count == '0'
    runs-on: ubuntu-latest
    steps:
      - name: No open PRs found
        run: echo "No open pull requests to validate."
